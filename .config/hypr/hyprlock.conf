# BACKGROUND
background {
    monitor =
    path = /home/souza/Wallpaper/saturno.png
    blur_passes = 2
    contrast = 0.9
    brightness = 0.85
    vibrancy = 0.15
}

# DIA DA SEMANA (PT-BR)
label {
    monitor =
    text = cmd[update:1000] echo "$(LC_TIME=pt_BR.UTF-8 date +'%A')"
    color = rgba(216, 222, 233, 0.85)
    font_size = 60
    font_family = SF Pro Display Bold
    position = 0, 260
    halign = center
    valign = center
    padding = 5px
}


# DATA (PT-BR)
label {
    monitor =
    text = cmd[update:1000] echo "$(LC_TIME=pt_BR.UTF-8 date +'%d de %B')"
    color = rgba(216, 222, 233, 0.85)
    font_size = 28
    font_family = SF Pro Display Bold
    position = 0, 190
    halign = center
    valign = center
    padding = 5px
}

# HORA (24H - MAIS DESTAQUE)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(216, 222, 233, 0.95)
    font_size = 42
    font_family = SF Pro Display Bold
    position = 0, 110
    halign = center
    valign = center
    padding = 5px
}

# FOTO DE PERFIL
image {
    monitor =
    path = /home/souza/Wallpaper/mrrobot.jpg
    size = 100
    rounding = -1
    border_size = 2
    border_color = rgba(255,255,255,0.6)
    position = 0, 20
    halign = center
    valign = center
}

# CAIXA USUÁRIO
shape {
    monitor = 
    size = 260, 50
    color = rgba(255,255,255,0.1)
    rounding = -1
    position = 0, -80
    halign = center
    valign = center
}

# USUÁRIO
label {
    monitor =
    text = 
    color = rgba(216,222,233,0.9)
    font_size = 16
    font_family = Fira Code Nerd Font Propo
    position = 0, -80
    halign = center
    valign = center
}

# INPUT
input-field {
    monitor =
    size = 260, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    inner_color = rgba(255,255,255,0.1)
    font_color = rgb(220,220,220)
    font_family = SF Pro Display Bold
    placeholder_text = <i>🔒 Digite sua senha</i>
    position = 0, -140
    halign = center
    valign = center
}

# REINICIAR
label {
    monitor =
    text = 󰜉
    color = rgba(255,255,255,0.6)
    font_size = 40
    onclick = reboot
    font_family = Fira Code Nerd Font Propo
    position = 0, 40
    halign = center
    valign = bottom
}

# DESLIGAR
label {
    monitor =
    text = 󰐥
    color = rgba(255,255,255,0.6)
    font_size = 40
    font_family = Fira Code Nerd Font Propo
    onclick = shutdown now
    position = 500, 40
    halign = left
    valign = bottom
}

# SUSPENDER
label {
    monitor =
    text = 󰤄
    color = rgba(255,255,255,0.6)
    font_size = 40
    font_family = Fira Code Nerd Font Propo
    onclick = systemctl suspend
    position = -500, 40
    halign = right
    valign = bottom
}